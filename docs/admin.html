<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYN Admin Panel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --card:     #1c2128;
    --border:   #30363d;
    --teal:     #0f766e;
    --teal-lt:  #14b8a6;
    --red:      #ef4444;
    --red-dk:   #b91c1c;
    --amber:    #f59e0b;
    --green:    #22c55e;
    --blue:     #3b82f6;
    --purple:   #a855f7;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --radius:   10px;
  }

  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 360px; }
  .login-box .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .login-box .logo svg { width: 32px; height: 32px; }
  .login-box .logo span { font-size: 20px; font-weight: 700; color: var(--teal-lt); }
  .login-box h2 { font-size: 16px; color: var(--muted); margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .field input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; transition: border .2s; }
  .field input:focus { border-color: var(--teal); }
  .btn-login { width: 100%; background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background .2s; }
  .btn-login:hover { background: var(--teal-lt); }
  .login-err { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; display: none; }

  /* ── SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left svg { width: 26px; height: 26px; }
  .header-left span { font-size: 16px; font-weight: 700; color: var(--teal-lt); }
  .header-left small { font-size: 11px; background: var(--teal); color: #fff; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #admin-name { font-size: 13px; color: var(--muted); }
  .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .2s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }
  .btn-refresh { background: var(--teal); border: none; color: #fff; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background .2s; }
  .btn-refresh:hover { background: var(--teal-lt); }

  main { flex: 1; padding: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
  .tab { padding: 8px 18px; border-radius: 7px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s; }
  .tab.active { background: var(--teal); color: #fff; }
  .tab:hover:not(.active) { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── ANALYTICS CARDS ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .color-teal  { color: var(--teal-lt); }
  .color-green { color: var(--green); }
  .color-blue  { color: var(--blue); }
  .color-amber { color: var(--amber); }
  .color-purple{ color: var(--purple); }
  .color-red   { color: var(--red); }
  .color-white { color: var(--text); }

  /* ── USERS TABLE ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 15px; font-weight: 600; }
  .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 12px; font-size: 13px; width: 240px; outline: none; }
  .search-box:focus { border-color: var(--teal); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--card); padding: 11px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  tbody td { padding: 11px 14px; vertical-align: middle; }
  .user-name { font-weight: 600; color: var(--text); }
  .user-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; }
  .badge-admin   { background: rgba(168,85,247,.2); color: var(--purple); border: 1px solid rgba(168,85,247,.3); }
  .badge-user    { background: rgba(139,148,158,.12); color: var(--muted); border: 1px solid var(--border); }
  .badge-premium { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .badge-verified{ background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .badge-banned  { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .trust-bar { width: 80px; background: var(--border); border-radius: 20px; height: 6px; overflow: hidden; }
  .trust-fill { height: 100%; border-radius: 20px; background: var(--teal-lt); }
  .trust-val { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .actions { display: flex; gap: 5px; flex-wrap: wrap; }
  .act-btn { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 5px; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .act-btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-ban   { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .btn-ban:hover:not(:disabled)   { background: rgba(245,158,11,.3); }
  .btn-unban { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .btn-unban:hover:not(:disabled) { background: rgba(34,197,94,.3); }
  .btn-verify{ background: rgba(59,130,246,.15); color: var(--blue);  border: 1px solid rgba(59,130,246,.3); }
  .btn-verify:hover:not(:disabled){ background: rgba(59,130,246,.3); }
  .btn-prem  { background: rgba(168,85,247,.15); color: var(--purple);border: 1px solid rgba(168,85,247,.3); }
  .btn-prem:hover:not(:disabled)  { background: rgba(168,85,247,.3); }
  .btn-del   { background: rgba(239,68,68,.15);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
  .btn-del:hover:not(:disabled)   { background: rgba(239,68,68,.3); }

  /* ── AUDIT LOG ── */
  .audit-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .audit-row { display: flex; align-items: center; gap: 14px; padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .audit-row:last-child { border-bottom: none; }
  .audit-action { font-weight: 600; min-width: 130px; }
  .audit-target { color: var(--muted); font-size: 12px; font-family: monospace; flex: 1; }
  .audit-time   { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .act-delete_user { color: var(--red); }
  .act-ban        { color: var(--amber); }
  .act-unban      { color: var(--green); }
  .act-verify     { color: var(--blue); }
  .act-grant_premium   { color: var(--purple); }
  .act-revoke_premium  { color: var(--muted); }

  /* ── EMPTY / LOADING ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--teal-lt); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row td { text-align: center; padding: 40px; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 28px; right: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 9999; display: none; max-width: 320px; }
  #toast.ok  { border-color: var(--teal); }
  #toast.err { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#0f766e"/>
        <circle cx="16" cy="10" r="3" fill="#fff"/>
        <circle cx="8"  cy="22" r="2.5" fill="#fff"/>
        <circle cx="24" cy="22" r="2.5" fill="#fff"/>
        <line x1="16" y1="10" x2="8"  y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/>
        <line x1="16" y1="10" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/>
        <line x1="8"  y1="22" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/>
      </svg>
      <span>BYN Admin</span>
    </div>

    <!-- Backend status indicator -->
    <div id="backend-status" style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:10px 12px;background:rgba(139,148,158,.1);border-radius:8px;font-size:12px;color:#8b949e;">
      <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#8b949e;flex-shrink:0;"></span>
      <span id="status-text">Checking backend…</span>
    </div>

    <!-- Toggle: Sign In / Create Account -->
    <div style="display:flex;gap:0;margin-bottom:20px;background:#1c2128;border-radius:8px;padding:3px;">
      <button id="tab-signin" onclick="showTab('signin')" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:#0f766e;color:#fff;transition:all .2s;">Sign In</button>
      <button id="tab-create" onclick="showTab('create')" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#8b949e;transition:all .2s;">Create Account</button>
    </div>

    <!-- Sign In panel -->
    <div id="panel-signin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@example.com" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Create Account panel (first-time setup) -->
    <div id="panel-create" style="display:none;">
      <p style="font-size:12px;color:#8b949e;margin-bottom:16px;line-height:1.5;">First time? Create your admin account. Admin access is granted only to pre-approved emails.</p>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="admin@example.com" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <button class="btn-login" id="signup-btn" onclick="doSignup()">Create Account</button>
    </div>

    <!-- Error message — large and visible -->
    <div id="login-err" style="display:none;margin-top:14px;padding:12px 14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#ef4444;font-size:13px;line-height:1.5;"></div>
    <!-- Success message -->
    <div id="login-ok" style="display:none;margin-top:14px;padding:12px 14px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:8px;color:#22c55e;font-size:13px;line-height:1.5;"></div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="header-left">
      <svg viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#0f766e"/>
        <circle cx="16" cy="10" r="3" fill="#fff"/>
        <circle cx="8"  cy="22" r="2.5" fill="#fff"/>
        <circle cx="24" cy="22" r="2.5" fill="#fff"/>
        <line x1="16" y1="10" x2="8"  y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/>
        <line x1="16" y1="10" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/>
        <line x1="8"  y1="22" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/>
      </svg>
      <span>BuildYourNetwork</span>
      <small>ADMIN</small>
    </div>
    <div class="header-right">
      <span id="admin-name"></span>
      <button class="btn-refresh" onclick="refreshAll()">↻ Refresh</button>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('analytics', this)">📊 Analytics</button>
      <button class="tab" onclick="switchTab('users', this)">👥 Users</button>
      <button class="tab" onclick="switchTab('audit', this)">📋 Audit Log</button>
    </div>

    <!-- ANALYTICS -->
    <div id="tab-analytics" class="tab-panel active">
      <div class="stat-grid" id="stat-grid">
        <div class="stat-card"><div class="label">Loading…</div><div class="value color-teal"><span class="spinner"></span></div></div>
      </div>
    </div>

    <!-- USERS -->
    <div id="tab-users" class="tab-panel">
      <div class="section-header">
        <span class="section-title">All Users</span>
        <input class="search-box" id="user-search" placeholder="Search by name or email…" oninput="filterUsers(this.value)">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Role / Status</th>
              <th>Trust</th>
              <th>Last Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr class="loading-row"><td colspan="5"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- AUDIT LOG -->
    <div id="tab-audit" class="tab-panel">
      <div class="section-header">
        <span class="section-title">Recent Admin Actions</span>
      </div>
      <div class="audit-list" id="audit-list">
        <div class="empty"><span class="spinner"></span></div>
      </div>
    </div>
  </main>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
  // ── STATE ──────────────────────────────────────────────────────────────────
  let TOKEN   = '';
  let ADMIN   = null;
  let allUsers = [];

  // API base: localhost in dev, Railway backend on production (GitHub Pages ≠ backend)
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000'
    : 'https://buildyournetwork.up.railway.app';

  // ── TOAST ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3200);
  }

  // ── AUTH ───────────────────────────────────────────────────────────────────
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-err');
    if (!email || !pass) { showErr('Enter email and password.'); return; }

    btn.textContent = 'Signing in…';
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const r = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass }),
      });
      const data = await r.json();
      if (!r.ok) { showErr(data.error || 'Login failed'); return; }
      if (data.user && data.user.role !== 'admin') { showErr('Access denied: admin only.'); return; }

      TOKEN = data.token;
      ADMIN = data.user;
      document.getElementById('admin-name').textContent = ADMIN.name || ADMIN.email;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadAnalytics();
      loadUsers();
      loadAudit();
    } catch(e) {
      showErr('Network error. Is the server running?');
    } finally {
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }

  function showErr(msg) {
    const el = document.getElementById('login-err');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('login-btn').textContent = 'Sign In';
    document.getElementById('login-btn').disabled = false;
  }

  function doLogout() {
    TOKEN = ''; ADMIN = null; allUsers = [];
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-err').style.display = 'none';
  }

  // Enter key on password triggers login
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ── TABS ───────────────────────────────────────────────────────────────────
  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function refreshAll() {
    loadAnalytics();
    loadUsers();
    loadAudit();
    toast('Refreshed');
  }

  // ── API HELPER ─────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.status);
    return data;
  }

  // ── ANALYTICS ──────────────────────────────────────────────────────────────
  async function loadAnalytics() {
    const grid = document.getElementById('stat-grid');
    grid.innerHTML = '<div class="stat-card"><div class="label">Loading…</div><div class="value color-teal"><span class="spinner"></span></div></div>';
    try {
      const d = await api('GET', '/api/admin/analytics');
      grid.innerHTML = `
        <div class="stat-card">
          <div class="label">Total Users</div>
          <div class="value color-teal">${d.users}</div>
          <div class="sub">${d.premium} premium · ${d.verified} verified</div>
        </div>
        <div class="stat-card">
          <div class="label">Daily Active (24h)</div>
          <div class="value color-green">${d.dau}</div>
          <div class="sub">${d.wau} weekly active</div>
        </div>
        <div class="stat-card">
          <div class="label">Premium Users</div>
          <div class="value color-amber">${d.premium}</div>
          <div class="sub">${d.users ? Math.round(d.premium / d.users * 100) : 0}% of total</div>
        </div>
        <div class="stat-card">
          <div class="label">Verified Users</div>
          <div class="value color-blue">${d.verified}</div>
          <div class="sub">&nbsp;</div>
        </div>
        <div class="stat-card">
          <div class="label">Profile Completion</div>
          <div class="value color-purple">${d.profile_completion_rate}</div>
          <div class="sub">completed profiles</div>
        </div>
        <div class="stat-card">
          <div class="label">Connections</div>
          <div class="value color-teal">${d.connections}</div>
          <div class="sub">${d.active_connections} active</div>
        </div>
        <div class="stat-card">
          <div class="label">Chat Conversion</div>
          <div class="value color-green">${d.match_to_conversation_rate}</div>
          <div class="sub">matches → messages</div>
        </div>
        <div class="stat-card">
          <div class="label">Messages Sent</div>
          <div class="value color-white">${(d.messages || 0).toLocaleString()}</div>
          <div class="sub">&nbsp;</div>
        </div>
        <div class="stat-card">
          <div class="label">Reports</div>
          <div class="value color-amber">${d.reports || 0}</div>
          <div class="sub">${d.blocks || 0} blocks</div>
        </div>
      `;
    } catch(e) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Failed to load analytics: ${e.message}</div>`;
    }
  }

  // ── USERS ──────────────────────────────────────────────────────────────────
  async function loadUsers() {
    document.getElementById('users-tbody').innerHTML =
      '<tr class="loading-row"><td colspan="5"><span class="spinner"></span></td></tr>';
    try {
      allUsers = await api('GET', '/api/admin/users');
      renderUsers(allUsers);
    } catch(e) {
      document.getElementById('users-tbody').innerHTML =
        `<tr><td colspan="5" class="empty">Failed to load users: ${e.message}</td></tr>`;
    }
  }

  function filterUsers(q) {
    q = q.toLowerCase();
    const filtered = q
      ? allUsers.filter(u => (u.name || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q))
      : allUsers;
    renderUsers(filtered);
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)   return 'just now';
    if (m < 60)  return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24)  return `${h}h ago`;
    const d = Math.floor(h / 24);
    return `${d}d ago`;
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No users found.</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => {
      const isSelf  = ADMIN && u.id === ADMIN.id;
      const isAdmin = u.role === 'admin';

      const badges = [
        `<span class="badge badge-${isAdmin ? 'admin' : 'user'}">${u.role || 'user'}</span>`,
        u.premium ? '<span class="badge badge-premium">Premium</span>' : '',
        u.verification && u.verification.status === 'verified' ? '<span class="badge badge-verified">Verified</span>' : '',
        u.banned ? '<span class="badge badge-banned">Banned</span>' : '',
      ].filter(Boolean).join(' ');

      const trust = u.trust_score || 0;
      const trustBar = `
        <div class="trust-bar"><div class="trust-fill" style="width:${Math.min(trust,100)}%"></div></div>
        <div class="trust-val">${trust}/100</div>`;

      // Actions — delete only for non-admin, non-self
      const canDelete = !isSelf && !isAdmin;
      const actions = `
        <div class="actions" data-id="${u.id}">
          ${u.banned
            ? `<button class="act-btn btn-unban" onclick="actionUser('unban','${u.id}',this)">Unban</button>`
            : `<button class="act-btn btn-ban"   onclick="actionUser('ban','${u.id}',this)">Ban</button>`}
          ${!u.verification || u.verification.status !== 'verified'
            ? `<button class="act-btn btn-verify" onclick="actionUser('verify','${u.id}',this)">Verify</button>` : ''}
          ${u.premium
            ? `<button class="act-btn btn-prem" onclick="actionUser('downgrade','${u.id}',this)">Revoke Premium</button>`
            : `<button class="act-btn btn-prem" onclick="actionUser('upgrade','${u.id}',this)">Grant Premium</button>`}
          ${canDelete
            ? `<button class="act-btn btn-del" onclick="deleteUser('${u.id}',this)">Delete</button>` : ''}
        </div>`;

      return `
        <tr id="row-${u.id}">
          <td>
            <div class="user-name">${esc(u.name || 'Unnamed')}</div>
            <div class="user-email">${esc(u.email || '')}</div>
          </td>
          <td>${badges}</td>
          <td>${trustBar}</td>
          <td>${timeAgo(u.last_active)}</td>
          <td>${actions}</td>
        </tr>`;
    }).join('');
  }

  // ── USER ACTIONS ───────────────────────────────────────────────────────────
  async function actionUser(action, userId, btn) {
    btn.disabled = true;
    try {
      if (action === 'ban' || action === 'unban') {
        await api('POST', '/api/admin/ban', { targetId: userId, banned: action === 'ban' });
        toast(action === 'ban' ? 'User banned' : 'User unbanned');
      } else if (action === 'verify') {
        await api('POST', '/api/admin/verify', { targetId: userId });
        toast('User verified');
      } else if (action === 'upgrade' || action === 'downgrade') {
        await api('POST', '/api/admin/upgrade', { targetId: userId, premium: action === 'upgrade' });
        toast(action === 'upgrade' ? 'Premium granted' : 'Premium revoked');
      }
      // Refresh just the users list to reflect changes
      await loadUsers();
    } catch(e) {
      toast('Error: ' + e.message, 'err');
      btn.disabled = false;
    }
  }

  // ── DELETE USER ────────────────────────────────────────────────────────────
  async function deleteUser(userId, btn) {
    // Step 1: Prevent double-click immediately
    btn.disabled = true;

    // Step 2: Confirm
    if (!confirm('Permanently delete this user?\n\nThis removes their account, connections, messages, reports, and blocks. This cannot be undone.')) {
      btn.disabled = false;
      return;
    }

    // Step 3: API call
    try {
      await api('DELETE', `/api/admin/users/${userId}`);

      // Step 4 (success): Remove only this row from DOM
      const row = document.getElementById('row-' + userId);
      if (row) row.closest('tr').remove();

      // Also remove from allUsers cache
      allUsers = allUsers.filter(u => u.id !== userId);

      toast('User deleted');
      loadAudit(); // refresh audit log to show the action
    } catch(e) {
      // Step 4 (error): alert + re-enable
      alert('Delete failed: ' + e.message);
      console.error('[deleteUser]', e);
      btn.disabled = false;
    }
  }

  // ── AUDIT LOG ──────────────────────────────────────────────────────────────
  async function loadAudit() {
    const el = document.getElementById('audit-list');
    el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
    try {
      const entries = await api('GET', '/api/admin/audit');
      if (!entries.length) {
        el.innerHTML = '<div class="empty">No admin actions yet.</div>';
        return;
      }
      el.innerHTML = entries.map(e => `
        <div class="audit-row">
          <span class="audit-action act-${e.action}">${formatAction(e.action)}</span>
          <span class="audit-target">${e.targetId}</span>
          <span class="audit-time">${timeAgo(e.at)}</span>
        </div>`).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty">Failed to load audit log: ${e.message}</div>`;
    }
  }

  function formatAction(a) {
    return {
      ban:            '🚫 Ban',
      unban:          '✅ Unban',
      verify:         '✔️ Verify',
      grant_premium:  '⭐ Grant Premium',
      revoke_premium: '↩️ Revoke Premium',
      delete_user:    '🗑️ Delete User',
    }[a] || a;
  }

  // ── UTILS ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── LOGIN TAB TOGGLE ───────────────────────────────────────────────────────
  function showTab(name) {
    const isSignin = name === 'signin';
    document.getElementById('panel-signin').style.display = isSignin ? 'block' : 'none';
    document.getElementById('panel-create').style.display = isSignin ? 'none'  : 'block';
    document.getElementById('tab-signin').style.background = isSignin ? '#0f766e' : 'transparent';
    document.getElementById('tab-signin').style.color      = isSignin ? '#fff'    : '#8b949e';
    document.getElementById('tab-create').style.background = isSignin ? 'transparent' : '#0f766e';
    document.getElementById('tab-create').style.color      = isSignin ? '#8b949e' : '#fff';
    // Clear messages when switching tabs
    document.getElementById('login-err').style.display = 'none';
    document.getElementById('login-ok').style.display  = 'none';
  }

  // ── SIGNUP ─────────────────────────────────────────────────────────────────
  async function doSignup() {
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-pass').value;
    const btn   = document.getElementById('signup-btn');
    const err   = document.getElementById('login-err');
    const ok    = document.getElementById('login-ok');

    err.style.display = 'none';
    ok.style.display  = 'none';

    if (!name)  { err.textContent = 'Enter your full name.';          err.style.display = 'block'; return; }
    if (!email) { err.textContent = 'Enter your email address.';      err.style.display = 'block'; return; }
    if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }

    btn.textContent = 'Creating account…';
    btn.disabled = true;

    try {
      const r = await fetch(`${API}/api/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password: pass }),
      });
      const data = await r.json();
      if (!r.ok) { err.textContent = data.error || 'Signup failed'; err.style.display = 'block'; return; }

      // Account created — auto sign in
      ok.textContent = 'Account created! Signing you in…';
      ok.style.display = 'block';

      // Small delay so user can read the message, then log in automatically
      setTimeout(async () => {
        const lr = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass }),
        });
        const ld = await lr.json();
        if (!lr.ok) { err.textContent = ld.error || 'Auto-login failed — please sign in manually.'; err.style.display = 'block'; ok.style.display = 'none'; return; }
        if (ld.user && ld.user.role !== 'admin') {
          err.textContent = 'Account created, but this email is not on the admin whitelist. Contact the site owner.';
          err.style.display = 'block';
          ok.style.display = 'none';
          return;
        }
        TOKEN = ld.token;
        ADMIN = ld.user;
        document.getElementById('admin-name').textContent = ADMIN.name || ADMIN.email;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadAnalytics();
        loadUsers();
        loadAudit();
      }, 800);

    } catch(e) {
      err.textContent = 'Network error — is the server running?';
      err.style.display = 'block';
    } finally {
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }

  // Enter key support for signup
  document.getElementById('signup-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSignup();
  });

  // ── BACKEND CONNECTIVITY CHECK ─────────────────────────────────────────────
  (async function checkBackend() {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    try {
      // Use a lightweight OPTIONS-equivalent: hit /api/login with a bad payload
      // We expect 400 (bad request) = server is up. Anything else = connectivity issue.
      const r = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
        signal: AbortSignal.timeout(6000),
      });
      // Any response (even 400/401) means server is reachable
      dot.style.background  = '#22c55e';
      text.textContent = 'Backend online';
      text.style.color = '#22c55e';
    } catch(e) {
      dot.style.background  = '#ef4444';
      text.textContent = 'Backend unreachable — check Railway';
      text.style.color = '#ef4444';
    }
  })();

</script>
