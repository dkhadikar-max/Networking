<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYN Admin Panel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--card:#1c2128;--border:#30363d;--teal:#0f766e;--teal-lt:#14b8a6;--red:#ef4444;--amber:#f59e0b;--green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--text:#e6edf3;--muted:#8b949e;--r:10px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.logo svg{width:32px;height:32px}
.logo span{font-size:20px;font-weight:700;color:var(--teal-lt)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--teal)}
.btn-login{width:100%;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s}
.btn-login:hover:not(:disabled){background:var(--teal-lt)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
#app{display:none;flex-direction:column;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hl{display:flex;align-items:center;gap:10px}
.hl svg{width:26px;height:26px}
.hl span{font-size:16px;font-weight:700;color:var(--teal-lt)}
.hl small{font-size:11px;background:var(--teal);color:#fff;padding:2px 8px;border-radius:20px;margin-left:6px}
.hr{display:flex;align-items:center;gap:12px}
#admin-name{font-size:13px;color:var(--muted)}
.btn-lo{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.btn-lo:hover{border-color:var(--red);color:var(--red)}
.btn-rf{background:var(--teal);border:none;color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.btn-rf:hover{background:var(--teal-lt)}
main{flex:1;padding:24px;max-width:1400px;width:100%;margin:0 auto}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;width:fit-content}
.tab{padding:8px 18px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.tab.active{background:var(--teal);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.stat-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
.stat-card .val{font-size:28px;font-weight:700;line-height:1}
.stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px}
.ct{color:var(--teal-lt)}.cg{color:var(--green)}.cb{color:var(--blue)}.ca{color:var(--amber)}.cp{color:var(--purple)}.cr{color:var(--red)}.cw{color:var(--text)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-size:15px;font-weight:600}
.sb{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-size:13px;width:240px;outline:none}
.sb:focus{border-color:var(--teal)}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--card);padding:11px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:11px 14px;vertical-align:middle}
.un{font-weight:600;color:var(--text)}
.ue{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.ba{background:rgba(168,85,247,.2);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.bu{background:rgba(139,148,158,.12);color:var(--muted);border:1px solid var(--border)}
.bp{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.bv{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.bb{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.tb{width:80px;background:var(--border);border-radius:20px;height:6px;overflow:hidden}
.tf{height:100%;border-radius:20px;background:var(--teal-lt)}
.tv{font-size:11px;color:var(--muted);margin-top:3px}
.actions{display:flex;gap:5px;flex-wrap:wrap}
.ab{font-size:11px;font-weight:600;padding:4px 9px;border-radius:5px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.ab:disabled{opacity:.45;cursor:not-allowed}
.a-ban{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.a-ban:hover:not(:disabled){background:rgba(245,158,11,.3)}
.a-unb{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.a-unb:hover:not(:disabled){background:rgba(34,197,94,.3)}
.a-ver{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.a-ver:hover:not(:disabled){background:rgba(59,130,246,.3)}
.a-pre{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.a-pre:hover:not(:disabled){background:rgba(168,85,247,.3)}
.a-del{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.a-del:hover:not(:disabled){background:rgba(239,68,68,.3)}
.al{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ar{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px}
.ar:last-child{border-bottom:none}
.aa{font-weight:600;min-width:130px}
.at{color:var(--muted);font-size:12px;font-family:monospace;flex:1}
.atm{font-size:11px;color:var(--muted);white-space:nowrap}
.act-delete_user{color:var(--red)}.act-ban{color:var(--amber)}.act-unban{color:var(--green)}.act-verify{color:var(--blue)}.act-grant_premium{color:var(--purple)}.act-revoke_premium{color:var(--muted)}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal-lt);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lr td{text-align:center;padding:40px}
#toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;display:none;max-width:320px}
#toast.ok{border-color:var(--teal)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#0f766e"/><circle cx="16" cy="10" r="3" fill="#fff"/><circle cx="8" cy="22" r="2.5" fill="#fff"/><circle cx="24" cy="22" r="2.5" fill="#fff"/><line x1="16" y1="10" x2="8" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/><line x1="16" y1="10" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/><line x1="8" y1="22" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/></svg>
      <span>BYN Admin</span>
    </div>
    <div id="bkst" style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:10px 12px;background:rgba(139,148,158,.1);border-radius:8px;font-size:12px;">
      <span id="sdot" style="width:8px;height:8px;border-radius:50%;background:#8b949e;flex-shrink:0;transition:background .3s"></span>
      <span id="stxt" style="color:#8b949e">Checking backend…</span>
    </div>
    <div style="display:flex;margin-bottom:20px;background:#1c2128;border-radius:8px;padding:3px">
      <button id="t-si" onclick="showTab('si')" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:#0f766e;color:#fff;transition:all .2s">Sign In</button>
      <button id="t-ca" onclick="showTab('ca')" style="flex:1;padding:7px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#8b949e;transition:all .2s">Create Account</button>
    </div>
    <div id="p-si">
      <div class="field"><label>Email</label><input type="email" id="li-em" placeholder="admin@example.com" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="li-pw" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-login" id="li-btn" onclick="doLogin()">Sign In</button>
    </div>
    <div id="p-ca" style="display:none">
      <p style="font-size:12px;color:#8b949e;margin-bottom:16px;line-height:1.5">First time? Create your account. Admin access is granted only to pre-approved emails.</p>
      <div class="field"><label>Full Name</label><input type="text" id="su-nm" placeholder="Your name" autocomplete="name"></div>
      <div class="field"><label>Email</label><input type="email" id="su-em" placeholder="admin@example.com" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="su-pw" placeholder="Min 6 characters" autocomplete="new-password"></div>
      <button class="btn-login" id="su-btn" onclick="doSignup()">Create Account</button>
    </div>
    <div id="l-err" style="display:none;margin-top:14px;padding:12px 14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:8px;color:#ef4444;font-size:13px;line-height:1.5"></div>
    <div id="l-ok"  style="display:none;margin-top:14px;padding:12px 14px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:8px;color:#22c55e;font-size:13px;line-height:1.5"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="hl">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#0f766e"/><circle cx="16" cy="10" r="3" fill="#fff"/><circle cx="8" cy="22" r="2.5" fill="#fff"/><circle cx="24" cy="22" r="2.5" fill="#fff"/><line x1="16" y1="10" x2="8" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/><line x1="16" y1="10" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/><line x1="8" y1="22" x2="24" y2="22" stroke="#fff" stroke-width="1.5" stroke-opacity=".7"/></svg>
      <span>BuildYourNetwork</span><small>ADMIN</small>
    </div>
    <div class="hr">
      <span id="admin-name"></span>
      <button class="btn-rf" onclick="refreshAll()">↻ Refresh</button>
      <button class="btn-lo" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <main>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('analytics',this)">📊 Analytics</button>
      <button class="tab" onclick="switchTab('users',this)">👥 Users</button>
      <button class="tab" onclick="switchTab('audit',this)">📋 Audit Log</button>
    </div>
    <div id="tab-analytics" class="tab-panel active">
      <div class="stat-grid" id="stat-grid"><div class="stat-card"><div class="lbl">Loading…</div><div class="val ct"><span class="spinner"></span></div></div></div>
    </div>
    <div id="tab-users" class="tab-panel">
      <div class="sh"><span class="st">All Users</span><input class="sb" id="user-search" placeholder="Search by name or email…" oninput="filterUsers(this.value)"></div>
      <div class="tw"><table>
        <thead><tr><th>User</th><th>Role/Status</th><th>Trust</th><th>Last Active</th><th>Actions</th></tr></thead>
        <tbody id="users-tbody"><tr class="lr"><td colspan="5"><span class="spinner"></span></td></tr></tbody>
      </table></div>
    </div>
    <div id="tab-audit" class="tab-panel">
      <div class="sh"><span class="st">Recent Admin Actions</span></div>
      <div class="al" id="audit-list"><div class="empty"><span class="spinner"></span></div></div>
    </div>
  </main>
</div>
<div id="toast"></div>

<script>
// API targets Railway backend directly.
// Once DNS propagates for buildyournetwork.online, update this to that domain.
const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://a3mtyxvq.up.railway.app';

let TOKEN='', ADMIN=null, allUsers=[];

// ── TOAST
let tt;
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className=t;e.style.display='block';clearTimeout(tt);tt=setTimeout(()=>e.style.display='none',3200)}

// ── UTILS
function showErr(m){const e=document.getElementById('l-err');e.textContent=m;e.style.display='block'}
function hideMsgs(){document.getElementById('l-err').style.display='none';document.getElementById('l-ok').style.display='none'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function timeAgo(iso){if(!iso)return'—';const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/6e4);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}

// ── BACKEND CHECK — GET /api/health returns {ok:true} only from real Railway backend
(async()=>{
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  try{
    const r=await fetch(API+'/api/health');
    const d=await r.json();
    if(d&&d.ok===true){dot.style.background='#22c55e';txt.style.color='#22c55e';txt.textContent='Backend online'}
    else throw 0;
  }catch(e){dot.style.background='#ef4444';txt.style.color='#ef4444';txt.textContent='Backend unreachable — check Railway'}
})();

// ── LOGIN TAB TOGGLE
function showTab(n){
  const si=n==='si';
  document.getElementById('p-si').style.display=si?'block':'none';
  document.getElementById('p-ca').style.display=si?'none':'block';
  document.getElementById('t-si').style.background=si?'#0f766e':'transparent';
  document.getElementById('t-si').style.color=si?'#fff':'#8b949e';
  document.getElementById('t-ca').style.background=si?'transparent':'#0f766e';
  document.getElementById('t-ca').style.color=si?'#8b949e':'#fff';
  hideMsgs();
}

// ── SIGN IN
async function doLogin(){
  hideMsgs();
  const email=document.getElementById('li-em').value.trim(),pass=document.getElementById('li-pw').value,btn=document.getElementById('li-btn');
  if(!email||!pass){showErr('Enter email and password.');return}
  btn.textContent='Signing in…';btn.disabled=true;
  try{
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok){showErr(d.error||'Login failed.');return}
    if(d.user&&d.user.role!=='admin'){showErr('Access denied — admin only.');return}
    enterApp(d.token,d.user);
  }catch(e){showErr('Network error: '+e.message)}
  finally{btn.textContent='Sign In';btn.disabled=false}
}

// ── CREATE ACCOUNT
async function doSignup(){
  hideMsgs();
  const name=document.getElementById('su-nm').value.trim(),email=document.getElementById('su-em').value.trim(),pass=document.getElementById('su-pw').value,btn=document.getElementById('su-btn');
  if(!name){showErr('Enter your full name.');return}
  if(!email){showErr('Enter your email address.');return}
  if(pass.length<6){showErr('Password must be at least 6 characters.');return}
  btn.textContent='Creating account…';btn.disabled=true;
  try{
    const r=await fetch(API+'/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pass})});
    const d=await r.json();
    if(!r.ok){showErr(d.error||'Signup failed.');return}
    const ok=document.getElementById('l-ok');ok.textContent='Account created! Signing you in…';ok.style.display='block';
    setTimeout(async()=>{
      try{
        const lr=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
        const ld=await lr.json();
        if(!lr.ok){showErr(ld.error||'Auto-login failed — use Sign In tab.');ok.style.display='none';return}
        if(ld.user&&ld.user.role!=='admin'){showErr('Account created but this email is not on the admin whitelist.');ok.style.display='none';return}
        enterApp(ld.token,ld.user);
      }catch(e){showErr('Auto-login error: '+e.message);document.getElementById('l-ok').style.display='none'}
    },800);
  }catch(e){showErr('Network error: '+e.message)}
  finally{btn.textContent='Create Account';btn.disabled=false}
}

// ── ENTER APP
function enterApp(token,user){
  TOKEN=token;ADMIN=user;
  document.getElementById('admin-name').textContent=ADMIN.name||ADMIN.email;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  loadAnalytics();loadUsers();loadAudit();
}

// ── LOGOUT
function doLogout(){
  TOKEN='';ADMIN=null;allUsers=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('li-pw').value='';hideMsgs();
}

// Enter key support
document.getElementById('li-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('su-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doSignup()});

// ── APP TABS
function switchTab(n,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}
function refreshAll(){loadAnalytics();loadUsers();loadAudit();toast('Refreshed')}

// ── API HELPER
async function apiCall(method,path,body){
  const opts={method,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||r.status);
  return d;
}

// ── ANALYTICS
async function loadAnalytics(){
  const g=document.getElementById('stat-grid');
  g.innerHTML='<div class="stat-card"><div class="lbl">Loading…</div><div class="val ct"><span class="spinner"></span></div></div>';
  try{
    const d=await apiCall('GET','/api/admin/analytics');
    g.innerHTML=`
      <div class="stat-card"><div class="lbl">Total Users</div><div class="val ct">${d.users}</div><div class="sub">${d.premium} premium · ${d.verified} verified</div></div>
      <div class="stat-card"><div class="lbl">Daily Active (24h)</div><div class="val cg">${d.dau}</div><div class="sub">${d.wau} weekly active</div></div>
      <div class="stat-card"><div class="lbl">Premium Users</div><div class="val ca">${d.premium}</div><div class="sub">${d.users?Math.round(d.premium/d.users*100):0}% of total</div></div>
      <div class="stat-card"><div class="lbl">Verified Users</div><div class="val cb">${d.verified}</div><div class="sub">&nbsp;</div></div>
      <div class="stat-card"><div class="lbl">Profile Completion</div><div class="val cp">${d.profile_completion_rate}</div><div class="sub">completed profiles</div></div>
      <div class="stat-card"><div class="lbl">Connections</div><div class="val ct">${d.connections}</div><div class="sub">${d.active_connections} active</div></div>
      <div class="stat-card"><div class="lbl">Chat Conversion</div><div class="val cg">${d.match_to_conversation_rate}</div><div class="sub">matches → messages</div></div>
      <div class="stat-card"><div class="lbl">Messages Sent</div><div class="val cw">${(d.messages||0).toLocaleString()}</div><div class="sub">&nbsp;</div></div>
      <div class="stat-card"><div class="lbl">Reports</div><div class="val ca">${d.reports||0}</div><div class="sub">${d.blocks||0} blocks</div></div>`;
  }catch(e){g.innerHTML=`<div class="empty" style="grid-column:1/-1">Failed: ${e.message}</div>`}
}

// ── USERS
async function loadUsers(){
  document.getElementById('users-tbody').innerHTML='<tr class="lr"><td colspan="5"><span class="spinner"></span></td></tr>';
  try{allUsers=await apiCall('GET','/api/admin/users');renderUsers(allUsers)}
  catch(e){document.getElementById('users-tbody').innerHTML=`<tr><td colspan="5" class="empty">Failed: ${e.message}</td></tr>`}
}
function filterUsers(q){q=q.toLowerCase();renderUsers(q?allUsers.filter(u=>(u.name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)):allUsers)}
function renderUsers(users){
  const tb=document.getElementById('users-tbody');
  if(!users.length){tb.innerHTML='<tr><td colspan="5" class="empty">No users found.</td></tr>';return}
  tb.innerHTML=users.map(u=>{
    const isSelf=ADMIN&&u.id===ADMIN.id,isAdmin=u.role==='admin';
    const badges=[
      `<span class="badge ${isAdmin?'ba':'bu'}">${u.role||'user'}</span>`,
      u.premium?'<span class="badge bp">Premium</span>':'',
      u.verification&&u.verification.status==='verified'?'<span class="badge bv">Verified</span>':'',
      u.banned?'<span class="badge bb">Banned</span>':''
    ].filter(Boolean).join(' ');
    const tr=u.trust_score||0;
    return`<tr id="row-${u.id}">
      <td><div class="un">${esc(u.name||'Unnamed')}</div><div class="ue">${esc(u.email||'')}</div></td>
      <td>${badges}</td>
      <td><div class="tb"><div class="tf" style="width:${Math.min(tr,100)}%"></div></div><div class="tv">${tr}/100</div></td>
      <td>${timeAgo(u.last_active)}</td>
      <td><div class="actions">
        ${u.banned?`<button class="ab a-unb" onclick="act('unban','${u.id}',this)">Unban</button>`:`<button class="ab a-ban" onclick="act('ban','${u.id}',this)">Ban</button>`}
        ${!u.verification||u.verification.status!=='verified'?`<button class="ab a-ver" onclick="act('verify','${u.id}',this)">Verify</button>`:''}
        ${u.premium?`<button class="ab a-pre" onclick="act('downgrade','${u.id}',this)">Revoke Premium</button>`:`<button class="ab a-pre" onclick="act('upgrade','${u.id}',this)">Grant Premium</button>`}
        ${!isSelf&&!isAdmin?`<button class="ab a-del" onclick="delUser('${u.id}',this)">Delete</button>`:''}
      </div></td>
    </tr>`;
  }).join('');
}

// ── USER ACTIONS
async function act(action,uid,btn){
  btn.disabled=true;
  try{
    if(action==='ban'||action==='unban'){await apiCall('POST','/api/admin/ban',{targetId:uid,banned:action==='ban'});toast(action==='ban'?'User banned':'User unbanned')}
    else if(action==='verify'){await apiCall('POST','/api/admin/verify',{targetId:uid});toast('User verified')}
    else if(action==='upgrade'||action==='downgrade'){await apiCall('POST','/api/admin/upgrade',{targetId:uid,premium:action==='upgrade'});toast(action==='upgrade'?'Premium granted':'Premium revoked')}
    await loadUsers();
  }catch(e){toast('Error: '+e.message,'err');btn.disabled=false}
}

// ── DELETE USER
async function delUser(uid,btn){
  btn.disabled=true;
  if(!confirm('Permanently delete this user?\n\nRemoves account, connections, messages, reports and blocks. Cannot be undone.')){btn.disabled=false;return}
  try{
    await apiCall('DELETE','/api/admin/users/'+uid);
    const row=document.getElementById('row-'+uid);if(row)row.remove();
    allUsers=allUsers.filter(u=>u.id!==uid);
    toast('User deleted');loadAudit();
  }catch(e){alert('Delete failed: '+e.message);btn.disabled=false}
}

// ── AUDIT LOG
async function loadAudit(){
  const el=document.getElementById('audit-list');
  el.innerHTML='<div class="empty"><span class="spinner"></span></div>';
  try{
    const entries=await apiCall('GET','/api/admin/audit');
    if(!entries.length){el.innerHTML='<div class="empty">No admin actions yet.</div>';return}
    el.innerHTML=entries.map(e=>`
      <div class="ar">
        <span class="aa act-${e.action}">${{ban:'🚫 Ban',unban:'✅ Unban',verify:'✔️ Verify',grant_premium:'⭐ Grant Premium',revoke_premium:'↩️ Revoke Premium',delete_user:'🗑️ Delete User'}[e.action]||e.action}</span>
        <span class="at">${e.targetId}</span>
        <span class="atm">${timeAgo(e.at)}</span>
      </div>`).join('');
  }catch(e){el.innerHTML=`<div class="empty">Failed: ${e.message}</div>`}
}
</script>
